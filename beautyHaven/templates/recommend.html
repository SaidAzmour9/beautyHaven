<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Recommendation</title>
</head>
<body>
    <h1>Find the Best Products for Your Skin Type</h1>
    <form method="POST">
        <label for="skin_type">Skin Type:</label>
        <select name="skin_type" id="skin_type" required>
            <option value="Combination">Combination</option>
            <option value="Dry">Dry</option>
            <option value="Normal">Normal</option>
            <option value="Oily">Oily</option>
            <option value="Sensitive">Sensitive</option>
        </select>
        <br>
        <label for="min_price">Minimum Price:</label>
        <input type="number" name="min_price" id="min_price">
        <br>
        <label for="max_price">Maximum Price:</label>
        <input type="number" name="max_price" id="max_price">
        <br>
        <label for="min_rank">Minimum Rank:</label>
        <input type="number" name="min_rank" id="min_rank">
        <br>
        <label for="brand">Preferred Brand:</label>
        <input type="text" name="brand" id="brand">
        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
